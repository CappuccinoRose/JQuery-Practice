<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时 - Made By CappuccinoRose</title>
    <script src="./jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        /* 标题 */
        .title {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .title .highlight {
            display: block;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            font-weight: normal;
        }

        /* 倒计时主体 */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-block {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px 20px;
            min-width: 100px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .time-block:hover {
            transform: translateY(-5px);
        }

        .time-value {
            font-size: 48px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
        }

        /* 分隔符 */
        .separator {
            display: flex;
            align-items: center;
            font-size: 36px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        /* 结束提示 */
        .ended-message {
            display: none;
            font-size: 28px;
            color: #fff;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            letter-spacing: 4px;
        }

        .ended-message.show {
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 底部提示 */
        .footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            距离目标时间
            <span class="highlight" id="targetDate"></span>
        </h1>

        <div class="countdown" id="countdown">
            <div class="time-block">
                <div class="time-value" id="days">00</div>
                <div class="time-label">天</div>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <div class="time-value" id="hours">00</div>
                <div class="time-label">时</div>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">分</div>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <div class="time-value" id="seconds">00</div>
                <div class="time-label">秒</div>
            </div>
        </div>

        <div class="ended-message" id="endedMessage">时间到！</div>

        <p class="footer">实时倒计时</p>
    </div>

    <script>
        $(function() {
            // 目标时间设置
            var targetTime = new Date("2027-11-19 00:00:00");
            
            // 显示目标日期
            $("#targetDate").text(formatDate(targetTime));

            // 格式化日期显示
            function formatDate(date) {
                var year = date.getFullYear();
                var month = date.getMonth() + 1;
                var day = date.getDate();
                return year + "年" + month + "月" + day + "日";
            }

            // 补零
            function padZero(num) {
                return num < 10 ? "0" + num : num;
            }

            // 更新倒计时
            function updateCountdown() {
                var now = new Date();
                var diff = targetTime - now;

                if (diff <= 0) {
                    // 倒计时结束
                    $("#countdown").hide();
                    $("#endedMessage").addClass("show");
                    clearInterval(timer);
                    return;
                }

                var days = Math.floor(diff / (1000 * 60 * 60 * 24));
                var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((diff % (1000 * 60)) / 1000);

                $("#days").text(padZero(days));
                $("#hours").text(padZero(hours));
                $("#minutes").text(padZero(minutes));
                $("#seconds").text(padZero(seconds));
            }

            // 立即执行一次
            updateCountdown();

            // 每秒更新
            var timer = setInterval(updateCountdown, 1000);
        });
    </script>
</body>
</html>
