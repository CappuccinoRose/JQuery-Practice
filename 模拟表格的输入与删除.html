<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理 - Made By CappuccinoRose</title>
    <script src="./jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecef 100%);
            font-family: "Microsoft YaHei", sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #4a5568;
            letter-spacing: 2px;
        }

        .header p {
            margin-top: 8px;
            color: #8a9aaa;
            font-size: 14px;
        }

        /* 统计卡片 */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #fff;
            padding: 20px 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-card .num {
            font-size: 32px;
            font-weight: 600;
            color: #6b8e7e;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8a9aaa;
            margin-top: 5px;
        }

        /* 表格容器 */
        .table-wrapper {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #a8c4c9 0%, #c9b8a8 100%);
        }

        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            color: #4a5568;
            letter-spacing: 1px;
            border-bottom: none;
        }

        td {
            padding: 14px 20px;
            font-size: 14px;
            color: #5a6a7a;
            border-bottom: 1px solid #f0f2f5;
        }

        tbody tr {
            transition: background 0.25s ease;
        }

        tbody tr:hover {
            background: #f8fafb;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* 成绩标签 */
        .score {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .score.excellent {
            background: #e8f5e9;
            color: #5a8a5a;
        }

        .score.good {
            background: #e3f2fd;
            color: #5a7a9a;
        }

        .score.average {
            background: #fff8e1;
            color: #9a8a5a;
        }

        .score.pass {
            background: #fce4ec;
            color: #9a5a6a;
        }

        /* 专业标签 */
        .major-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #f5f7fa;
            border-radius: 6px;
            font-size: 12px;
            color: #6a7a8a;
            border-left: 3px solid #a8c4c9;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生信息管理</h1>
            <p>Student Information Management System</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="num" id="totalCount">0</div>
                <div class="label">总人数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="avgScore">0</div>
                <div class="label">平均分</div>
            </div>
            <div class="stat-card">
                <div class="num" id="maxScore">0</div>
                <div class="label">最高分</div>
            </div>
            <div class="stat-card">
                <div class="num" id="passRate">0%</div>
                <div class="label">及格率</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>姓名</th>
                        <th>年龄</th>
                        <th>专业</th>
                        <th>成绩</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const students = [
            // 计算机科学与技术
            {name: '林一', age: 20, major: '计算机科学与技术', score: 99},
            {name: '王五', age: 21, major: '计算机科学与技术', score: 88},
            {name: '张三', age: 22, major: '计算机科学与技术', score: 77},
            {name: '李四', age: 21, major: '计算机科学与技术', score: 88},
            {name: '陈明', age: 20, major: '计算机科学与技术', score: 92},
            {name: '刘洋', age: 22, major: '计算机科学与技术', score: 85},
            
            // 软件工程
            {name: '赵雪', age: 21, major: '软件工程', score: 90},
            {name: '孙伟', age: 20, major: '软件工程', score: 83},
            {name: '周婷', age: 22, major: '软件工程', score: 76},
            {name: '吴磊', age: 21, major: '软件工程', score: 95},
            {name: '郑欣', age: 20, major: '软件工程', score: 88},
            
            // 信息管理与信息系统
            {name: '黄宇', age: 21, major: '信息管理与信息系统', score: 91},
            {name: '徐瑶', age: 22, major: '信息管理与信息系统', score: 87},
            {name: '何晨', age: 20, major: '信息管理与信息系统', score: 82},
            {name: '张雨', age: 21, major: '信息管理与信息系统', score: 94},
            
            // 数据科学与大数据技术
            {name: '李娜', age: 22, major: '数据科学与大数据技术', score: 96},
            {name: '王浩', age: 20, major: '数据科学与大数据技术', score: 89},
            {name: '陈静', age: 21, major: '数据科学与大数据技术', score: 73},
            {name: '杨帆', age: 22, major: '数据科学与大数据技术', score: 91},
            {name: '马越', age: 20, major: '数据科学与大数据技术', score: 86},
            
            // 人工智能
            {name: '朱峰', age: 21, major: '人工智能', score: 98},
            {name: '胡蝶', age: 20, major: '人工智能', score: 84},
            {name: '郭强', age: 22, major: '人工智能', score: 79},
            {name: '罗敏', age: 21, major: '人工智能', score: 93},
            
            // 网络工程
            {name: '梁涛', age: 20, major: '网络工程', score: 81},
            {name: '宋佳', age: 22, major: '网络工程', score: 87},
            {name: '唐杰', age: 21, major: '网络工程', score: 75},
            {name: '许晴', age: 20, major: '网络工程', score: 90},
            
            // 信息安全
            {name: '韩冰', age: 21, major: '信息安全', score: 97},
            {name: '冯雷', age: 22, major: '信息安全', score: 85},
            {name: '邓超', age: 20, major: '信息安全', score: 88},
            {name: '曹芳', age: 21, major: '信息安全', score: 92}
        ];

        // 渲染表格
        function renderTable() {
            const tbody = $('#tableBody');
            tbody.empty();

            students.forEach((student, index) => {
                const scoreClass = getScoreClass(student.score);
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.name}</td>
                        <td>${student.age}</td>
                        <td><span class="major-tag">${student.major}</span></td>
                        <td><span class="score ${scoreClass}">${student.score}</span></td>
                    </tr>
                `;
                tbody.append(row);
            });

            updateStats();
        }

        // 成绩等级样式
        function getScoreClass(score) {
            if (score >= 90) return 'excellent';
            if (score >= 80) return 'good';
            if (score >= 70) return 'average';
            return 'pass';
        }

        // 更新统计数据
        function updateStats() {
            const total = students.length;
            const sum = students.reduce((acc, s) => acc + s.score, 0);
            const avg = (sum / total).toFixed(1);
            const max = Math.max(...students.map(s => s.score));
            const passCount = students.filter(s => s.score >= 60).length;
            const passRate = ((passCount / total) * 100).toFixed(0);

            $('#totalCount').text(total);
            $('#avgScore').text(avg);
            $('#maxScore').text(max);
            $('#passRate').text(passRate + '%');
        }

        $(document).ready(function() {
            renderTable();
        });
    </script>
</body>
</html>
