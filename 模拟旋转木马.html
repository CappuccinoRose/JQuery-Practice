<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影回廊 - 旋转木马</title>
    <script src="./jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #2c3e50 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* 观察者距离，影响3D纵深感 */
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 标题 */
        .main-title {
            color: rgba(255, 255, 255, 0.8);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 60px;
            text-shadow: 0 0 10px rgba(168, 196, 201, 0.5);
            position: relative;
            z-index: 10;
        }

        /* 3D 容器 */
        .carousel-wrapper {
            width: 240px;
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            /* 初始旋转角度，让视角更好 */
            transform: rotateX(-10deg) rotateY(0deg); 
            animation: autoRotate 15s infinite linear;
        }

        /* 暂停动画的类 */
        .carousel-wrapper.paused {
            animation-play-state: paused;
        }

        /* 3D 旋转动画 */
        @keyframes autoRotate {
            from { transform: rotateX(-10deg) rotateY(0deg); }
            to { transform: rotateX(-10deg) rotateY(360deg); }
        }

        /* 单个图片项 */
        .carousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            /* 倒影效果：下方 10px，渐变遮罩 */
            -webkit-box-reflect: below 15px linear-gradient(transparent 50%, rgba(0,0,0,0.4));
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 图片上的文字遮罩 */
        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            font-size: 12px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .carousel-item:hover .item-overlay {
            opacity: 1;
        }

        /* 悬停时卡片轻微放大发光 */
        .carousel-item:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(168, 196, 201, 0.6);
            z-index: 10;
        }

        /* 计算6张图的 3D 位置 */
        /* 360deg / 6 = 60deg */
        .carousel-item:nth-child(1) { transform: rotateY(0deg) translateZ(280px); }
        .carousel-item:nth-child(2) { transform: rotateY(60deg) translateZ(280px); }
        .carousel-item:nth-child(3) { transform: rotateY(120deg) translateZ(280px); }
        .carousel-item:nth-child(4) { transform: rotateY(180deg) translateZ(280px); }
        .carousel-item:nth-child(5) { transform: rotateY(240deg) translateZ(280px); }
        .carousel-item:nth-child(6) { transform: rotateY(300deg) translateZ(280px); }

        /* 底部提示 */
        .hint {
            position: fixed;
            bottom: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1 class="main-title">光 影 回 廊</h1>

    <!-- 旋转容器 -->
    <div class="carousel-wrapper" id="carousel">
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro1/400/300" alt="晨曦微光">
            <div class="item-overlay">晨曦微光</div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro2/400/300" alt="暮色温柔">
            <div class="item-overlay">暮色温柔</div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro3/400/300" alt="星河滚烫">
            <div class="item-overlay">星河滚烫</div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro4/400/300" alt="人间理想">
            <div class="item-overlay">人间理想</div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro5/400/300" alt="山海自有归期">
            <div class="item-overlay">山海自有归期</div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/seed/caro6/400/300" alt="风雨自有相逢">
            <div class="item-overlay">风雨自有相逢</div>
        </div>
    </div>

    <div class="hint">鼠标悬停图片可暂停旋转</div>

    <script>
        $(function() {
            var $carousel = $('#carousel');
            
            // 鼠标移入暂停，移出继续
            $carousel.on('mouseenter', function() {
                $(this).addClass('paused');
            });
            
            $carousel.on('mouseleave', function() {
                $(this).removeClass('paused');
            });
        });
    </script>
</body>
</html>
