<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D导航 - jQuery练习 -Made by CappuccinoRose</title>
    <script src="./jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            font-family: "Microsoft YaHei", sans-serif;
        }

        ul {
            list-style: none;
        }

        a {
            display: block;
            text-decoration: none;
            color: #5a6a7a;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #7c9a92;
        }

        /* 导航容器 */
        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 600px;
            height: 120px;
            margin: 15% auto;
        }

        /* 导航项通用样式 */
        .nav-item {
            width: 120px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item > li {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            backface-visibility: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            font-weight: 500;
            color: #5a5a4a;
        }

        /* ========== 前后翻转 ========== */
        .fontBack > li:nth-child(1) {
            background: linear-gradient(145deg, #d4c4a8, #c9b896);
        }

        .fontBack > li:nth-child(2) {
            background: linear-gradient(145deg, #a8c4c9, #96b8b8);
            transform: rotateY(180deg);
        }

        .fontBack.flipped {
            transform: rotateY(180deg);
        }

        /* ========== 上翻 ========== */
        .upFont > li:nth-child(1) {
            background: linear-gradient(145deg, #c9b8d4, #b8a8c9);
        }

        .upFont > li:nth-child(2) {
            background: linear-gradient(145deg, #b8d4c9, #a8c9b8);
            transform: rotateX(-90deg) translateZ(30px);
        }

        .upFont.flipped {
            transform: rotateX(90deg);
        }

        /* ========== 普通导航 ========== */
        .nav {
            width: 120px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: linear-gradient(145deg, #c9d4b8, #b8c9a8);
            font-weight: 500;
            color: #5a5a4a;
            position: relative;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .nav .menu-arrow {
            margin-left: 6px;
            border: 4px solid transparent;
            border-top-color: currentColor;
            transition: transform 0.3s ease;
        }

        .nav.active .menu-arrow {
            transform: rotate(180deg);
        }

        /* ========== 下拉菜单 ========== */
        .menu {
            position: absolute;
            top: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 6px 0;
            display: none;
            z-index: 100;
        }

        .menu li a {
            padding: 10px 18px;
            transition: all 0.25s ease;
        }

        .menu li a:hover {
            background: #f8f9fa;
            padding-left: 22px;
        }
    </style>
</head>
<body>
    <nav class="box">
        <!-- 前后翻转 -->
        <ul class="nav-item fontBack">
            <li>
                <a href="#">个人中心</a>
                <ul class="menu">
                    <li><a href="#">我的主页</a></li>
                    <li><a href="#">我的收藏</a></li>
                    <li><a href="#">我的关注</a></li>
                    <li><a href="#">浏览历史</a></li>
                </ul>
            </li>
            <li>背面内容</li>
        </ul>

        <!-- 上翻 -->
        <ul class="nav-item upFont">
            <li>消息通知</li>
            <li>
                <ul class="menu">
                    <li><a href="#">系统消息</a></li>
                    <li><a href="#">互动消息</a></li>
                    <li><a href="#">私信</a></li>
                </ul>
            </li>
        </ul>

        <!-- 普通下拉 -->
        <div class="nav">
            论坛
            <span class="menu-arrow"></span>
            <ul class="menu">
                <li><a href="#">技术交流</a></li>
                <li><a href="#">资源共享</a></li>
                <li><a href="#">休闲灌水</a></li>
            </ul>
        </div>
    </nav>

    <script>
        // 防抖函数
        function debounce(fn, delay) {
            let timer = null;
            return function() {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }

        // 前后翻转 - 使用明确的 enter/leave
        $(".fontBack").on({
            mouseenter: function() {
                $(this).addClass("flipped");
                $(this).find(".menu").stop(true, true).slideDown(250);
            },
            mouseleave: function() {
                $(this).removeClass("flipped");
                $(this).find(".menu").stop(true, true).slideUp(150);
            }
        });

        // 上翻
        $(".upFont").on({
            mouseenter: function() {
                $(this).addClass("flipped");
                $(this).find(".menu").stop(true, true).slideDown(250);
            },
            mouseleave: function() {
                $(this).removeClass("flipped");
                $(this).find(".menu").stop(true, true).slideUp(150);
            }
        });

        // 普通下拉
        $(".nav").on({
            mouseenter: function() {
                $(this).addClass("active");
                $(this).find(".menu").stop(true, true).slideDown(250);
            },
            mouseleave: function() {
                $(this).removeClass("active");
                $(this).find(".menu").stop(true, true).slideUp(150);
            }
        });
    </script>
</body>
</html>
